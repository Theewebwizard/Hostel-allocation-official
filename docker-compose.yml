version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hostel_allocation_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hostel_allocation
    # Do not expose postgres port to host machine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hostel_net

  redis:
    image: redis:7-alpine
    container_name: hostel_allocation_redis
    # Fully ephemeral — no disk persistence. Orphaned allocation runs are
    # reconciled automatically by AdminService.onModuleInit() on NestJS startup
    # (HTTP 404 from Python engine → run marked FAILED in PostgreSQL).
    # Internal service-to-service only; port not exposed to host.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hostel_net

  allocation-engine:
    build:
      context: ./allocation-engine
      dockerfile: Dockerfile
    container_name: hostel_allocation_engine
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-super_secret_webhook_token_2026}
      CORE_SERVICES_URL: http://core-services:3000
      # Redis connection for stateless allocation run state storage
      REDIS_URL: redis://redis:6379/0
    # Do not expose allocation-engine port to host machine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hostel_net

  core-services:
    build:
      context: ./core-services
      dockerfile: Dockerfile
    container_name: hostel_allocation_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: hostel_allocation
      JWT_SECRET: ${JWT_SECRET:-jwt_secret_token_default_value}
      ALLOCATION_ENGINE_URL: http://allocation-engine:8000
      CORE_SERVICES_BASE_URL: http://core-services:3000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-super_secret_webhook_token_2026}
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hostel_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hostel_allocation_web
    ports:
      - "80:80"
    depends_on:
      - core-services
    networks:
      - hostel_net

volumes:
  postgres_data:

networks:
  hostel_net:
    driver: bridge

